name: Release

# Fires when a version tag is pushed (e.g. v0.32.8). Creates a GitHub Release
# and attaches the desktop client artifacts so users can download them straight
# from the Releases page. Day-to-day updates still flow via promptparle.com, but
# this gives GitHub a canonical, versioned record + downloadable client.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sanity-check version files match the tag
        run: |
          set -e
          FILE_VER="$(tr -d '[:space:]' < public/version.txt)"
          if [ "$FILE_VER" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::public/version.txt ($FILE_VER) does not match tag (${{ steps.ver.outputs.version }})."
            echo "Bump the 6 version spots before tagging (see CONTRIBUTING.md)."
            exit 1
          fi
          echo "version.txt matches tag: $FILE_VER"

      - name: Verify client artifacts exist
        run: |
          set -e
          for f in public/PromptParle-PowerShell.tgz public/PromptParle.psd1 public/version.txt public/PromptParle.version; do
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
          done
          echo "All client artifacts present."

      - name: Extract changelog section for this version
        id: notes
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # Pull the section for this version out of CHANGELOG.md (best-effort).
          awk -v ver="$VER" '
            $0 ~ "^## \\[?" ver "\\]?" {grab=1; print; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          echo "Wrote release-notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PromptParle ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            public/PromptParle-PowerShell.tgz
            public/PromptParle.psd1
            public/version.txt
            public/PromptParle.version
